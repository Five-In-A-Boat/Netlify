[build]
  command = "npm run build"

# IMPORTANT:
# Do not force a publish directory for Next.js App Router sites.
# Netlify's Next.js runtime/plugin generates the correct deploy output
# (including required server/edge functions) during the build.
# Setting `publish = ".next"` can result in static-only deploys where
# no functions are deployed and pages render blank.

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Inject consent scripts as the very first <head> children on every HTML page.
[[edge_functions]]
  function = "inject-consent"
  path = "/*"

[build.environment]
  NODE_VERSION = "20"

# Security + performance headers applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Next.js App Router requires 'unsafe-inline' for its bootstrap scripts and React inline styles
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://assets.calendly.com https://client.crisp.chat https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com; style-src 'self' 'unsafe-inline' https://assets.calendly.com https://client.crisp.chat https://fonts.googleapis.com; img-src 'self' data: blob: https://image.crisp.chat https://storage.crisp.chat https://client.crisp.chat https://www.googletagmanager.com https://www.google-analytics.com; font-src 'self' https://client.crisp.chat https://fonts.gstatic.com; connect-src 'self' https://calendly.com https://client.crisp.chat wss://client.relay.crisp.chat https://storage.crisp.chat https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com; frame-src https://calendly.com https://game.crisp.chat; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"

# Hashed Next.js chunks are immutable — safe to cache for 1 year
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Public images can be cached for a day
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
